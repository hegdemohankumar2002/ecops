<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cops | Forum Thread</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root { --primary: #0ea5e9; --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --sidebar-bg: rgba(15, 23, 42, 0.8); --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: rgba(255, 255, 255, 0.1); --success: #22c55e;}
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; }
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 25px 0; }
        .logo { padding: 0 25px; font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 30px; }
        .nav-link { display: block; padding: 12px 25px; color: var(--text-muted); text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(14,165,233,0.1); color: var(--primary); }
        .main-content { flex: 1; padding: 40px; max-width: 900px;}
        .header { margin-bottom: 30px; } h1 { margin: 0 0 5px 0; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 20px;}
        .form-control { width: 100%; padding: 12px; background: rgba(15,23,42,0.6); border: 1px solid var(--border-color); border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 15px;}
        textarea.form-control { resize: vertical; min-height: 80px; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.9em; font-weight: 600;}
        .btn:hover { background: #0284c7; }
        
        .message-box { padding: 20px; background: rgba(15,23,42,0.5); border-radius: 8px; margin-bottom: 15px; border-left: 3px solid var(--primary); }
        .reply-box { padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; margin-left: 30px; border-left: 2px solid var(--text-muted); }
        .author-meta { font-size: 0.85em; color: var(--text-muted); margin-bottom: 10px; }
        .content { line-height: 1.5; white-space: pre-wrap; }
        
        .alert { padding: 12px; background: rgba(34,197,94,0.1); color: var(--success); border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">E-Cops Intelligence</div>
        <a href="/dashboard" class="nav-link">← Back to Dashboard</a>
        <a href="/officer/intelligence" class="nav-link">Intelligence Search</a>
        <a href="/officer/forum" class="nav-link active">Internal Forum</a>
    </aside>

    <main class="main-content">
        <div class="header">
            <a href="/officer/forum" style="color: var(--primary); text-decoration: none;">&larr; Back to Forum</a>
        </div>
        
        <div th:if="${param.success}" class="alert" th:text="${param.success}"></div>

        <div class="card">
            <!-- Original Post -->
            <div class="message-box">
                <h2 style="margin-top: 0; color: var(--primary);" th:text="${post.title}">Title</h2>
                <div class="author-meta">
                    <strong><span th:text="${post.author.fullName}">Author</span></strong> 
                    (<span th:text="${post.author.role}">Role</span>) 
                    - <span th:text="${#dates.format(post.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                </div>
                <div class="content" th:text="${post.content}">Content</div>
            </div>

            <h3 style="margin-top: 30px;">Replies</h3>
            
            <!-- Replies -->
            <div th:each="reply : ${post.replies}" class="reply-box">
                <div class="author-meta">
                    <strong><span th:text="${reply.author.fullName}">Author</span></strong> 
                    (<span th:text="${reply.author.role}">Role</span>) 
                    - <span th:text="${#dates.format(reply.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                </div>
                <div class="content" th:text="${reply.content}">Content</div>
            </div>
            
            <div th:if="${#lists.isEmpty(post.replies)}" style="text-align: center; color: var(--text-muted); padding: 10px; margin-bottom: 20px;">
                No replies yet.
            </div>

            <!-- Add Reply -->
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <form th:action="@{/officer/forum/{id}/reply(id=${post.id})}" method="post">
                    <textarea name="content" class="form-control" required placeholder="Write a reply..."></textarea>
                    <button type="submit" class="btn">Add Reply</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
