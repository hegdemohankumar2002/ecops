<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cops | Case Registry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root { --primary: #0ea5e9; --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --sidebar-bg: rgba(15, 23, 42, 0.8); --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: rgba(255, 255, 255, 0.1); --success: #22c55e;}
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; }
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 25px 0; }
        .logo { padding: 0 25px; font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 30px; }
        .nav-link { display: block; padding: 12px 25px; color: var(--text-muted); text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(14,165,233,0.1); color: var(--primary); }
        .main-content { flex: 1; padding: 40px; }
        .header { margin-bottom: 30px; } h1 { margin: 0 0 5px 0; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-weight: 600; }
        .btn { padding: 8px 15px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.9em; }
        .btn:hover { background: #0284c7; }
        .warrant-PENDING { color: #f59e0b; }
        .warrant-APPROVED { color: #22c55e; }
        .warrant-DENIED { color: #ef4444; }
        .alert { padding: 12px; background: rgba(34,197,94,0.1); color: var(--success); border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">E-Cops Officer</div>
        <a href="/dashboard" class="nav-link">← Back to Dashboard</a>
        <a href="/officer/complaints" class="nav-link">Incoming Complaints</a>
        <a href="/officer/case-registry" class="nav-link active">Case Registry</a>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Case Registry</h1>
            <p style="color: var(--text-muted);">Manage ongoing cases and update investigation details.</p>
        </div>
        
        <div th:if="${param.success}" class="alert" th:text="${param.success}"></div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Case ID</th>
                        <th>Incident Title</th>
                        <th>Station</th>
                        <th>Warrant Status</th>
                        <th>Last Updated</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${cases}">
                        <td th:text="'CASE-' + ${c.id}">ID</td>
                        <td th:text="${c.complaint.title}">Title</td>
                        <td th:text="${c.complaint.policeStation.name}">Station</td>
                        <td><strong th:class="'warrant-' + ${c.warrantStatus}" th:text="${c.warrantStatus}">STATUS</strong></td>
                        <td th:text="${#dates.format(c.lastUpdated, 'MMM dd, yyyy')}">Date</td>
                        <td><a th:href="@{/officer/cases/{id}(id=${c.id})}" class="btn">Update Case</a></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(cases)}">
                        <td colspan="6" style="text-align: center; color: var(--text-muted);">No cases found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
