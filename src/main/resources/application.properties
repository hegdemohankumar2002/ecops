# Server Configuration
server.port=8080

# Spring DataSource Configuration (MySQL default for this project)
spring.datasource.url=jdbc:mysql://localhost:3306/ecops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Console (Fallback/Testing)
# If MySQL is not running, uncomment the H2 configurations and comment MySQL above
# spring.datasource.url=jdbc:h2:mem:ecops_db
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Thymeleaf cache
spring.thymeleaf.cache=false
