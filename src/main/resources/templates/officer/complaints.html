<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cops | Incoming Complaints</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root { --primary: #0ea5e9; --primary-hover: #0284c7; --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --sidebar-bg: rgba(15, 23, 42, 0.8); --text-main: #f8fafc; --text-muted: #94a3b8; --success: #22c55e; --danger: #ef4444; --border-color: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; }
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 25px 0; }
        .logo { padding: 0 25px; font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 30px; }
        .nav-link { display: block; padding: 12px 25px; color: var(--text-muted); text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(14,165,233,0.1); color: var(--primary); }
        .main-content { flex: 1; padding: 40px; }
        .header { margin-bottom: 30px; } h1 { margin: 0 0 5px 0; }
        .grid { display: grid; gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        .card-title { font-size: 1.2em; font-weight: 600; margin: 0 0 5px 0; }
        .meta { font-size: 0.85em; color: var(--text-muted); }
        .desc { line-height: 1.5; margin-bottom: 20px; }
        .actions { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9em; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
        .status-PENDING { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-FIR_FILED { background: rgba(14, 165, 233, 0.2); color: #0ea5e9; }
        .status-REJECTED { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .alert { padding: 12px; background: rgba(34,197,94,0.1); color: var(--success); border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">E-Cops Officer</div>
        <a href="/dashboard" class="nav-link">← Back to Dashboard</a>
        <a href="/officer/complaints" class="nav-link active">Incoming Complaints</a>
        <a href="/officer/case-registry" class="nav-link">Case Registry</a>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Incoming Complaints</h1>
            <p style="color: var(--text-muted);">Review citizen complaints assigned to your jurisdiction.</p>
        </div>

        <div th:if="${param.success}" class="alert" th:text="${param.success}"></div>

        <div class="grid">
            <div th:each="complaint : ${complaints}" class="card">
                <div class="card-header">
                    <div>
                        <h3 class="card-title" th:text="${complaint.title}">Title</h3>
                        <div class="meta">
                            Reported by <strong th:text="${complaint.citizen.fullName}">Citizen</strong> on 
                            <span th:text="${#dates.format(complaint.filingDate, 'MMM dd, yyyy')}">Date</span>
                            at <span th:text="${complaint.policeStation.name}">Station</span>
                        </div>
                    </div>
                    <span th:class="'status-badge status-' + ${complaint.status}" th:text="${complaint.status}">STATUS</span>
                </div>
                
                <div class="desc" th:text="${complaint.description}">Description</div>
                
                <div class="actions" th:if="${complaint.status.name() == 'PENDING'}">
                    <!-- File FIR Form -->
                    <form th:action="@{/officer/complaints/{id}/fir(id=${complaint.id})}" method="post" style="display: flex; gap: 10px; width: 100%;">
                        <input type="text" name="firDetails" required placeholder="Initial FIR Findings/Notes..." 
                               style="flex: 1; padding: 8px 12px; background: rgba(15,23,42,0.6); border: 1px solid var(--border-color); border-radius: 6px; color: white;">
                        <button type="submit" class="btn btn-primary">File FIR (Open Case)</button>
                    </form>
                    
                    <!-- Reject Form -->
                    <form th:action="@{/officer/complaints/{id}/reject(id=${complaint.id})}" method="post">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to reject this complaint?');">Reject</button>
                    </form>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(complaints)}" style="text-align: center; color: var(--text-muted); padding: 40px;">
                No complaints found for your assigned stations.
            </div>
        </div>
    </main>
</body>
</html>
