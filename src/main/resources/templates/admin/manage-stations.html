<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cops | Manage Stations</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar (Simplified copy for Admin) */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 25px 0;
        }
        .logo { padding: 0 25px; font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 30px; }
        .nav-link { display: block; padding: 12px 25px; color: var(--text-muted); text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(14,165,233,0.1); color: var(--primary); }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
        }

        .header { margin-bottom: 30px; }
        h1 { margin: 0 0 10px 0; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); }
        .form-control { width: 100%; padding: 10px; background: rgba(15,23,42,0.6); border: 1px solid var(--border-color); border-radius: 6px; color: white; box-sizing: border-box; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn:hover { background: var(--primary-hover); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); }
        
        .alert { padding: 12px; background: rgba(34,197,94,0.1); color: var(--success); border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">E-Cops Admin</div>
        <a href="/dashboard" class="nav-link">← Back to Dashboard</a>
        <a href="/admin/stations" class="nav-link active">Manage Stations</a>
        <a href="/admin/assign-officers" class="nav-link">Assign Officers</a>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Virtual Police Stations</h1>
            <p style="color: var(--text-muted);">Create and manage police stations in the system.</p>
        </div>

        <div th:if="${param.success}" class="alert" th:text="${param.success}"></div>

        <div class="card">
            <h3>Create New Station</h3>
            <form th:action="@{/admin/stations}" th:object="${newStation}" method="post">
                <div class="form-group">
                    <label>Station Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required placeholder="e.g. Central City PS">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>District</label>
                        <input type="text" th:field="*{district}" class="form-control" required placeholder="e.g. North District">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Zone</label>
                        <input type="text" th:field="*{zone}" class="form-control" required placeholder="e.g. Zone A">
                    </div>
                </div>
                <button type="submit" class="btn">Create Station</button>
            </form>
        </div>

        <div class="card">
            <h3>Existing Stations</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>District</th>
                        <th>Zone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="station : ${stations}">
                        <td th:text="${station.id}">1</td>
                        <td th:text="${station.name}">Name</td>
                        <td th:text="${station.district}">District</td>
                        <td th:text="${station.zone}">Zone</td>
                        <td>
                            <a th:href="@{/admin/stations/{stationId}(stationId=${station.id})}" class="btn" style="text-decoration: none; padding: 5px 10px; font-size: 0.9em;">Manage</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(stations)}">
                        <td colspan="5" style="text-align: center; color: var(--text-muted);">No stations found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
