<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cops | Station Details</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 25px 0; }
        .logo { padding: 0 25px; font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 30px; }
        .nav-link { display: block; padding: 12px 25px; color: var(--text-muted); text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(14,165,233,0.1); color: var(--primary); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; }
        .header { margin-bottom: 30px; }
        h1 { margin: 0 0 5px 0; }
        .subtitle { color: var(--text-muted); margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 30px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); }
        .form-control { width: 100%; padding: 10px; background: rgba(15,23,42,0.6); border: 1px solid var(--border-color); border-radius: 6px; color: white; box-sizing: border-box; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn:hover { background: var(--primary-hover); }

        ul { list-style: none; padding: 0; margin: 15px 0 0 0; }
        li { padding: 10px; border-bottom: 1px solid var(--border-color); }
        li:last-child { border-bottom: none; }
        
        .alert { padding: 12px; background: rgba(34,197,94,0.1); color: var(--success); border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">E-Cops Admin</div>
        <a href="/dashboard" class="nav-link">← Back to Dashboard</a>
        <a href="/admin/stations" class="nav-link active">Manage Stations</a>
        <a href="/admin/assign-officers" class="nav-link">Assign Officers</a>
    </aside>

    <main class="main-content">
        <div class="header">
            <a href="/admin/stations" style="color: var(--primary); text-decoration: none; font-size: 0.9em;">&larr; Back to Stations</a>
            <h1 th:text="${station.name}">Station Name</h1>
            <p class="subtitle" th:text="${station.district} + ' District - Zone: ' + ${station.zone}">Location</p>
        </div>

        <div th:if="${param.success}" class="alert" th:text="${param.success}"></div>

        <div class="grid">
            <!-- Areas of Control -->
            <div class="card">
                <h3>Areas of Control</h3>
                <form th:action="@{/admin/stations/{stationId}/areas(stationId=${station.id})}" th:object="${newArea}" method="post" style="margin-bottom: 20px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" th:field="*{areaName}" class="form-control" required placeholder="Area Name">
                        <input type="text" th:field="*{zipCode}" class="form-control" required placeholder="Zip Code" style="width: 120px;">
                        <button type="submit" class="btn">Add</button>
                    </div>
                </form>
                
                <h4 style="margin-bottom: 5px;">Current Areas:</h4>
                <ul>
                    <li th:each="area : ${station.areasOfControl}">
                        <strong th:text="${area.areaName}">Name</strong> 
                        <span style="color: var(--text-muted); font-size: 0.9em;" th:text="'(' + ${area.zipCode} + ')'"></span>
                    </li>
                    <li th:if="${#lists.isEmpty(station.areasOfControl)}" style="color: var(--text-muted);">No areas defined.</li>
                </ul>
            </div>

            <!-- Departments -->
            <div class="card">
                <h3>Departments</h3>
                <form th:action="@{/admin/stations/{stationId}/departments(stationId=${station.id})}" th:object="${newDept}" method="post" style="margin-bottom: 20px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" th:field="*{name}" class="form-control" required placeholder="e.g. Cybercrime">
                        <button type="submit" class="btn">Add</button>
                    </div>
                </form>
                
                <h4 style="margin-bottom: 5px;">Current Departments:</h4>
                <ul>
                    <li th:each="dept : ${station.departments}" th:text="${dept.name}">Dept Name</li>
                    <li th:if="${#lists.isEmpty(station.departments)}" style="color: var(--text-muted);">No departments defined.</li>
                </ul>
            </div>
        </div>

    </main>

</body>
</html>
